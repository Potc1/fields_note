

name: CI/CD for Project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -s -v  test_temp.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ success() }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
        
    - name: Install sshpass
      run: sudo apt-get install -y sshpass
      
    - name: Deploy to Server
      run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{secrets.SERVER_HOST}} << EOF
            cd /home/admin/var/www/fields_note
            git config --global credential.helper store
            echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" > ~/.git-credentials
            git pull origin main
          EOF
          
